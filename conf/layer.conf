# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-practice"
BBFILE_PATTERN_meta-practice = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-practice = "6"

LAYERDEPENDS_meta-practice = "core"
LAYERSERIES_COMPAT_meta-practice = "kirkstone"
